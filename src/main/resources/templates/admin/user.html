<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="page-container">
    <div class="page-header">
        <h2 class="page-title">用户管理</h2>
        <button class="btn btn-primary" onclick="showAddModal()">+ 新增用户</button>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
            <tr>
                <th width="80">ID</th>
                <th>用户名</th>
                <th width="100">状态</th>
                <th width="180">操作</th>
            </tr>
            </thead>
            <tbody id="userTable">
            <tr>
                <td colspan="4" style="text-align: center; padding: 40px;">加载中...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal-overlay" id="userModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">新增用户</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="userName" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="userPassword" placeholder="请输入密码">
                    <small id="passwordHint" style="color: #999; display: none;">编辑时留空则不修改密码</small>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="userActive">
                        <option value="1">启用</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-default" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveUser()">确定</button>
        </div>
    </div>
</div>

<script th:src="@{/js/user.js}"></script>
</body>
</html>
