<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="page-container">
    <div class="page-header">
        <h2 class="page-title">商品分类管理</h2>
        <button class="btn btn-primary" onclick="showAddModal()">+ 新增分类</button>
    </div>

    <div class="table-container">
        <table class="data-table">
            <thead>
            <tr>
                <th width="80">ID</th>
                <th>分类名称</th>
                <th>分类描述</th>
                <th width="180">操作</th>
            </tr>
            </thead>
            <tbody id="categoryTable">
            <tr>
                <td colspan="4" style="text-align: center; padding: 40px;">加载中...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">新增分类</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                <div class="form-group">
                    <label>分类名称</label>
                    <input type="text" id="categoryName" placeholder="请输入分类名称" required>
                </div>
                <div class="form-group">
                    <label>分类描述</label>
                    <textarea id="categoryDesc" placeholder="请输入分类描述"></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-default" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveCategory()">确定</button>
        </div>
    </div>
</div>

<script th:src="@{/js/category.js}"></script>
</body>
</html>
