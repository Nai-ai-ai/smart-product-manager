<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎页</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="page-container">
    <div class="welcome-container">
        <h1 class="welcome-title">欢迎使用智慧商品信息管理系统</h1>

        <div class="stats-cards">
            <div class="stat-card">
                <div class="icon">📦</div>
                <div class="number" id="productCount">--</div>
                <div class="label">商品总数</div>
            </div>
            <div class="stat-card">
                <div class="icon">📁</div>
                <div class="number" id="categoryCount">--</div>
                <div class="label">商品分类</div>
            </div>
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="number" id="userCount">--</div>
                <div class="label">系统用户</div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/welcome.js}"></script>
</body>
</html>
