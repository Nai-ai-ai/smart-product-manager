<!DOCTYPE html>
<html lang="zh-CN" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 智慧优选</title>
    <link rel="stylesheet" href="/css/liquid-glass.css">
    <style>
        body {
            background: url('/images/bg-harbor.png') no-repeat center center fixed;
            background-size: cover;
        }
        
        .user-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* 顶部导航 */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            margin-bottom: 32px;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), #8ba4ff);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 16px var(--primary-glow);
        }
        
        .brand-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #b48eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .user-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        
        .user-profile {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }
        
        .user-name {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .top-nav {
            overflow: visible !important;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        /* 统计卡片 */
        .glass-stat-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.08),
                inset 0 2px 0 rgba(255, 255, 255, 0.5),
                inset 0 -2px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .glass-stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.15), inset 0 4px 20px rgba(255, 255, 255, 0.25);
        }
        
        .glass-stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .glass-stat-icon.blue {
            background: linear-gradient(135deg, rgba(110, 140, 255, 0.3), rgba(110, 140, 255, 0.15));
        }
        
        .glass-stat-icon.green {
            background: linear-gradient(135deg, rgba(52, 199, 89, 0.3), rgba(52, 199, 89, 0.15));
        }
        
        .glass-stat-icon.orange {
            background: linear-gradient(135deg, rgba(255, 149, 0, 0.3), rgba(255, 149, 0, 0.15));
        }
        
        .glass-stat-info {
            flex: 1;
        }
        
        .glass-stat-label {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }
        
        .glass-stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6e8cff, #b48eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        /* 商品网格 */
        .products-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .products-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        
        /* 分类筛选 */
        .category-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .category-chip {
            padding: 8px 18px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .category-chip:hover {
            background: var(--glass-bg-hover);
            color: var(--text-primary);
        }
        
        .category-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 16px var(--primary-glow);
        }
        
        /* 商品详情弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            max-width: 480px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                inset 0 -1px 0 rgba(255, 255, 255, 0.3);
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .modal-img {
            width: 100%;
            height: 280px;
            overflow: hidden;
            position: relative;
        }
        
        .modal-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .modal-img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            background: linear-gradient(135deg, rgba(110, 140, 255, 0.1), rgba(180, 142, 255, 0.1));
        }
        
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .modal-close:hover {
            background: white;
            transform: scale(1.1);
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(80vh - 280px);
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .modal-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .modal-price {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #6e8cff, #b48eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .modal-category {
            font-size: 14px;
            color: var(--text-tertiary);
            background: var(--glass-bg);
            padding: 6px 14px;
            border-radius: 20px;
        }

        /* 商品卡片 - 去掉高光 */
        .product-card::before,
        .product-card::after {
            border-radius: 20px;
            display: none;
        }
        
        .product-card .product-img {
            height: 160px;
            overflow: hidden;
        }
        
        .product-card .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .product-card .product-info {
            padding: 12px;
        }
        
        .product-card .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        
        .product-card .product-desc {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .product-card .product-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .product-card .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .product-card .product-category {
            font-size: 12px;
            color: var(--text-tertiary);
            background: var(--glass-bg);
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* 底部信息 */
        .footer-info {
            text-align: center;
            padding: 40px 0 20px;
            color: var(--text-tertiary);
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .top-nav {
                flex-direction: column;
                gap: 16px;
            }
        }

        /* 全局 MiSans 字体 + 统一样式 */
        * {
            font-family: "MiSans", -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Microsoft YaHei", sans-serif !important;
        }
        
        body {
            font-weight: 400;
            letter-spacing: 0.2px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* 标题字重 */
        h1, h2, h3, h4, h5, h6, .brand-text, .glass-stat-label {
            font-weight: 600 !important;
        }
        
        /* 正文字重 */
        p, span, a, td, th, li, .glass-stat-value, .product-name, .product-desc {
            font-weight: 400;
        }
        
        /* 按钮字重 */
        .glass-btn, button {
            font-weight: 500 !important;
        }
        
        /* 玻璃面板上的文字颜色统一 */
        .glass-panel, .glass-card, .glass-stat-card {
            color: var(--text-on-glass);
        }
        
        .glass-panel .glass-stat-label,
        .glass-card .product-desc {
            color: var(--text-on-glass-secondary) !important;
        }
        
        /* 数字字重 */
        .glass-stat-value, .product-price {
            font-weight: 600 !important;
        }

        /* 退出登录下拉菜单 */
        .logout-btn-standalone {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            color: rgba(80, 80, 80, 0.9);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            white-space: nowrap;
            box-shadow: 
                0 4px 16px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
        }
        
        .logout-btn-standalone:hover {
            background: rgba(255, 107, 107, 0.35);
            border-color: rgba(255, 107, 107, 0.5);
            color: rgba(180, 50, 50, 0.95);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.25);
        }
        
        
        
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- SVG Filter 定义 -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="liquid-distortion">
                <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>
    <!-- 商品详情弹窗 -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <div class="modal-img">
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div id="modalImgContainer"></div>
            </div>
            <div class="modal-body">
                <h2 class="modal-title" id="modalTitle"></h2>
                <p class="modal-desc" id="modalDesc"></p>
                <div class="modal-footer">
                    <span class="modal-price" id="modalPrice"></span>
                    <span class="modal-category" id="modalCategory"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="user-container">
        <!-- 顶部导航 -->
        <div class="top-nav glass-panel">
            <div class="brand">
                <div class="brand-icon">✨</div>
                <div class="brand-text">智慧优选</div>
            </div>
            <div class="user-actions">
                <div class="user-profile">
                    <div class="user-avatar">👤</div>
                    <span class="user-name" th:text="${username}">user</span>
                </div>
                <a href="/logout" class="logout-btn-standalone">退出登录</a>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="glass-stat-card">
                <div class="glass-stat-icon blue">📦</div>
                <div class="glass-stat-info">
                    <div class="glass-stat-label">商品总数</div>
                    <div class="glass-stat-value" id="totalCount">-</div>
                </div>
            </div>
            <div class="glass-stat-card">
                <div class="glass-stat-icon green">📁</div>
                <div class="glass-stat-info">
                    <div class="glass-stat-label">商品分类</div>
                    <div class="glass-stat-value" id="catCount">-</div>
                </div>
            </div>
            <div class="glass-stat-card">
                <div class="glass-stat-icon orange">💰</div>
                <div class="glass-stat-info">
                    <div class="glass-stat-label">均价</div>
                    <div class="glass-stat-value" id="avgPrice">-</div>
                </div>
            </div>
        </div>

        <!-- 商品列表 -->
        <div class="products-section">
            <div class="products-header">
                <h2 class="products-title">精选商品</h2>
                <div class="category-filters" id="categoryFilters">
                    <span class="category-chip active" data-id="">全部</span>
                </div>
            </div>
            <div class="products-grid" id="productsGrid">
                <div class="glass-loading">加载中...</div>
            </div>
        </div>

        <div class="footer-info">
            ✨ 智慧优选 — 精选好物，品质生活
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script>
        let currentCategory = '';
        
        $(function(){
            loadStats();
            loadCategories();
            loadProducts();
            
            // 头像点击切换下拉菜单
            $('#avatarBtn').on('click', function(e){
                e.stopPropagation();
                $('#logoutDropdown').toggle();
            });
            // 点击其他地方关闭
            $(document).on('click', function(e){
                if(!$(e.target).closest('#avatarBtn').length && !$(e.target).closest('#logoutDropdown').length){
                    $('#logoutDropdown').hide();
                }
            });
        });
        
        function loadStats(){
            $.get("/api/product/page",{pageNum:1,pageSize:1},function(r){
                if(r.code===200){
                    $("#totalCount").text(r.data.total);
                }
            });
            $.get("/api/category/list",function(r){
                if(r.code===200){
                    $("#catCount").text(r.data.length);
                }
            });
            $.get("/api/product/page",{pageNum:1,pageSize:100},function(r){
                if(r.code===200){
                    let list=r.data.list;
                    if(list.length>0){
                        let sum=list.reduce((a,b)=>a+parseFloat(b.price),0);
                        $("#avgPrice").text("¥"+(sum/list.length).toFixed(2));
                    }
                }
            });
        }
        
        function loadCategories(){
            $.get("/api/category/list",function(r){
                if(r.code===200){
                    let html='<span class="category-chip active" data-id="">全部</span>';
                    r.data.forEach(c=>{
                        html+=`<span class="category-chip" data-id="${c.id}">${c.name}</span>`;
                    });
                    $("#categoryFilters").html(html);
                    
                    $(".category-chip").click(function(){
                        $(".category-chip").removeClass("active");
                        $(this).addClass("active");
                        currentCategory = $(this).data("id");
                        loadProducts();
                    });
                }
            });
        }
        
        function loadProducts(){
            let params = {pageNum:1, pageSize:20};
            if(currentCategory){
                params.categoryId = currentCategory;
            }
            $("#productsGrid").html('<div class="glass-loading">加载中...</div>');
            
            $.get("/api/product/page", params, function(r){
                if(r.code===200){
                    let list = r.data.list;
                    if(list.length===0){
                        $("#productsGrid").html('<div class="glass-loading">暂无商品</div>');
                        return;
                    }
                    let html = '';
                    list.forEach(p=>{
                        html += `
                            <div class="glass-card product-card" data-id="${p.id}" data-name="${p.name}" data-desc="${p.descp || ''}" data-price="${p.price}" data-category="${p.categoryName || ''}" data-img="${p.photoUrl || ''}" onclick="showDetail(this.dataset.id, this.dataset.name, this.dataset.desc, this.dataset.price, this.dataset.category, this.dataset.img)">
                                <div class="product-img">
                                    ${p.photoUrl ? `<img src="${p.photoUrl}" alt="${p.name}">` : '<div class="product-img-placeholder">📦</div>'}
                                </div>
                                <div class="product-info">
                                    <h3 class="product-name">${p.name}</h3>
                                    <p class="product-desc">${p.descp || '暂无描述'}</p>
                                    <div class="product-bottom">
                                        <span class="product-price">¥${parseFloat(p.price).toFixed(2)}</span>
                                        <span class="product-category">${p.categoryName || ''}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    $("#productsGrid").html(html);
                }
            });
        }

        function showDetail(id, name, desc, price, category, img) {
            $("#modalTitle").text(name);
            $("#modalDesc").text(desc || '暂无描述');
            $("#modalPrice").text('¥' + parseFloat(price).toFixed(2));
            $("#modalCategory").text(category);
            if(img){
                $("#modalImgContainer").html('<img src="' + img + '" alt="' + name + '">');
            } else {
                $("#modalImgContainer").html('<div class="modal-img-placeholder">📦</div>');
            }
            $("#productModal").addClass("active");
        }
        function closeModal() {
            $("#productModal").removeClass("active");
        }
        $(document).on("click", ".modal-overlay", function(e) {
            if(e.target === this) closeModal();
        });
    </script>
</body>
</html>
