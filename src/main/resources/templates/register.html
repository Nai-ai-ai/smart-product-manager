<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧商品信息管理系统 - 注册</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>智慧商品信息管理系统</h1>
            <p style="color: #999; margin-top: 8px;">用户注册</p>
        </div>
        <div class="login-form">
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required>
                </div>
                <div class="form-group" id="errorMsg" style="display: none;">
                    <div class="error-msg" id="errorText"></div>
                </div>
                <div class="form-group" id="successMsg" style="display: none;">
                    <div class="success-msg" id="successText"></div>
                </div>
                <button type="submit" class="login-btn">注 册</button>
            </form>
            <div style="text-align: center; margin-top: 16px;">
                <a th:href="@{/login}" style="color: #6e8cff; text-decoration: none; font-size: 14px;">已有账号？去登录</a>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var confirmPassword = document.getElementById('confirmPassword').value;
    
    var errorMsg = document.getElementById('errorMsg');
    var errorText = document.getElementById('errorText');
    var successMsg = document.getElementById('successMsg');
    var successText = document.getElementById('successText');
    
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    
    if (!username || !password) {
        errorText.textContent = '请填写所有字段';
        errorMsg.style.display = 'block';
        return;
    }
    
    if (password !== confirmPassword) {
        errorText.textContent = '两次输入的密码不一致';
        errorMsg.style.display = 'block';
        return;
    }
    
    if (password.length < 6) {
        errorText.textContent = '密码长度不能少于6位';
        errorMsg.style.display = 'block';
        return;
    }
    
    fetch('/api/user/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        if (data.code === 200) {
            successText.textContent = '注册成功！3秒后跳转到登录页...';
            successMsg.style.display = 'block';
            setTimeout(function() {
                window.location.href = '/login';
            }, 3000);
        } else {
            errorText.textContent = data.msg || '注册失败';
            errorMsg.style.display = 'block';
        }
    })
    .catch(function(error) {
        errorText.textContent = '网络错误，请重试';
        errorMsg.style.display = 'block';
    });
});
</script>
</body>
</html>
